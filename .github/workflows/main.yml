on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  default:
    runs-on: ubuntu-latest
    name: Run with default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: kind
        name: Install Kind with registry
        uses: ./
      - name: Print registry
        run: |
          echo Kind registry: ${{ steps.kind.outputs.registry }} >> $GITHUB_STEP_SUMMARY
      - name: Test tools
        run: |
          echo jq
          jq --version
          echo yq
          yq --version
          echo helm
          helm version
          echo chainsaw
          chainsaw version
          echo kubectl
          kubectl version
          kubectl get nodes

  parametrized:
    runs-on: ubuntu-latest
    name: Run parameterized
    strategy:
      fail-fast: false
      matrix:
        # https://hub.docker.com/r/kindest/node/tags
        k8s_version: ["v1.34.8", "v1.35.5", "v1.36.1"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build test image
        run: |
          docker build -t test-image:1.0.0 -f .github/test/Dockerfile .
          docker save test-image:1.0.0 > test-image.tar
      - id: kind
        name: Install Kind with registry
        uses: ./
        with:
          debug: true
          node_image: kindest/node:${{ matrix.k8s_version }}
          kubectl_version: ${{ matrix.k8s_version }}
          docker_image_name: 'test-image:1.0.0'
          docker_image_file: 'test-image.tar'
          port_mappings: |
              - containerPort: 30080
                hostPort: 80
                protocol: TCP
