name: "Kind Cluster"
description: "Create a kind (Kubernetes IN Docker) cluster"
author: "bakito"
inputs:
  kind_version:
    description: 'The version of kind to use'
    required: false
    # renovate: github-releases kubernetes-sigs/kind
    default: 'v0.32.0'
  kind_cluster_name:
    description: 'The name of kind cluster'
    required: false
    default: 'chart-testing'
  kubectl_version:
    description: 'The version of kubectl to use'
    required: false
    # renovate: custom.k8s kubectl
    default: 'v1.36.1'
  node_image:
    description: 'The version of node image to use'
    required: false
    # renovate: docker
    default: 'kindest/node:v1.36.1'
  debug:
    description: enable debug output for helm chart installation
    required: false
    default: false
  docker_image_name:
    description: Name of the docker image to import to kind
    required: false
    default: ""
  docker_image_file:
    description: Name of the docker image file (tar) to import to kind
    required: false
    default: ""
  port_mappings:
    description: |
      Optional kind node port mappings to set as nodes[0].extraPortMappings.
      Must be a YAML list (multi-line), e.g.
        - containerPort: 30080
          hostPort: 80
          protocol: TCP
    required: false
    default: |
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
runs:
  using: "composite"
  steps:
    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

    - name: Install jq
      uses: dcarbone/install-jq-action@b7ef57d46ece78760b4019dbc4080a1ba2a40b45 # v3.2.0

    - name: Install yq
      uses: dcarbone/install-yq-action@4075b4dca348d74bd83f2bf82d30f25d7c54539b # v1.3.1

    - name: Install Chainsaw
      uses: kyverno/action-install-chainsaw@1223ef75bedeb59c4e7b5455463d4316e76dff01 # v0.2.15

    - name: Prepare kind config
      shell: bash
      env:
        port_mappings: ${{ inputs.port_mappings }}
      run: |
        set -euo pipefail

        BASE_CONFIG="${{ github.action_path }}/kind-config.yaml"
        OUT_CONFIG="${RUNNER_TEMP}/kind-config.yaml"

        cp "${BASE_CONFIG}" "${OUT_CONFIG}"

        # Only apply if there's something other than whitespace
        if [[ -n "${port_mappings//[[:space:]]/}" ]]; then
          echo "Setting nodes[0].extraPortMappings from input..."
          yq -i '.nodes[0].extraPortMappings = (strenv(port_mappings) | from_yaml)' "${OUT_CONFIG}"

          echo "extraPortMappings written to kind config:"
          yq '.nodes[0].extraPortMappings' "${OUT_CONFIG}"
        else
          echo "No port_mappings provided."
        fi

        echo "KIND_CONFIG=${OUT_CONFIG}" >> "${GITHUB_ENV}"
    - name: Create kind cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
      with:
        version: ${{ inputs.kind_version }}
        cluster_name: ${{ inputs.kind_cluster_name }}
        kubectl_version: ${{ inputs.kubectl_version }}
        node_image: ${{ inputs.node_image }}
        config: ${{ env.KIND_CONFIG }}
        verbosity: ${{ inputs.debug == 'true' && '9' || '0' }}

    - name: Import docker image
      if: ${{ inputs.docker_image_name != '' }}
      shell: bash
      run: |
        set -euo pipefail

        # Extract input variables
        IMAGE_FILE="${{ inputs.docker_image_file }}"
        IMAGE_NAME="${{ inputs.docker_image_name }}"
        CLUSTER_NAME="${{ inputs.kind_cluster_name }}"

        # Import image from file if specified
        if [[ -n "${IMAGE_FILE}" ]]; then
          echo "📥 Importing docker image from file: ${IMAGE_FILE}"
          docker load -i "${IMAGE_FILE}"
        fi
        echo "🖼️ Loading docker image ${IMAGE_NAME} into kind cluster"
        kind load docker-image "${IMAGE_NAME}" --name "${CLUSTER_NAME}"
