kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        apiVersion: kubeadm.k8s.io/v1beta4
        nodeRegistration:
          kubeletExtraArgs:
            - name: "node-labels"
              value: "ingress-ready=true"
      - |
        kind: ClusterConfiguration
        apiVersion: kubeadm.k8s.io/v1beta4
      - |
        kind: JoinConfiguration
        apiVersion: kubeadm.k8s.io/v1beta4
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
containerdConfigPatches:
  - |-
    [plugins."io.containerd.cri.v1.images".registry.mirrors."localhost:5001"]
      endpoint = ["http://kind-registry:5000"]
